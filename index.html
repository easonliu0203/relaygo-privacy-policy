<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RELAY GO 隱私權政策 - 選擇客戶端或司機端隱私權政策">
    <title>RELAY GO 隱私權政策</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .privacy-button {
            display: block;
            padding: 20px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .customer-button {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
        }
        
        .customer-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }
        
        .driver-button {
            background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
            color: white;
        }
        
        .driver-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        
        .icon {
            font-size: 24px;
            margin-right: 10px;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 14px;
            }
            
            .privacy-button {
                padding: 18px 25px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚗</div>
        <h1>RELAY GO 隱私權政策</h1>
        <p class="subtitle">Privacy Policy</p>
        <p class="subtitle">請選擇您要查看的隱私權政策<br>Please select the privacy policy you want to view</p>
        
        <div class="button-group">
            <a href="customer.html" class="privacy-button customer-button">
                <span class="icon">👤</span>
                客戶端隱私權政策<br>
                <small style="font-size: 14px; font-weight: normal;">Customer Privacy Policy</small>
            </a>
            
            <a href="driver.html" class="privacy-button driver-button">
                <span class="icon">🚕</span>
                司機端隱私權政策<br>
                <small style="font-size: 14px; font-weight: normal;">Driver Privacy Policy</small>
            </a>
        </div>
        
        <div class="footer">
            <p>&copy; 2025 RELAY GO. All rights reserved.</p>
            <p>生效日期 Effective Date: 2025 年 1 月 1 日 / January 1, 2025</p>
        </div>
    </div>
</body>
</html>
